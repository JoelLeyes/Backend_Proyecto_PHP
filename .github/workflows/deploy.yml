name: deploy-backend

on:
  workflow_run:
    workflows: ["Laravel"]
    types: [completed]
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER: proyecto_php_cluster
      K8S_NAMESPACE: proyecto2026
      ECR_REPOSITORY: proyecto/backend
      # Fallback ECR registry (account 975543725234). If login action fails, workflow will use this.
      FALLBACK_ECR_REGISTRY: 975543725234.dkr.ecr.us-east-1.amazonaws.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.1.1
        continue-on-error: true

      - name: Build and push image
        env:
          ECR_REGISTRY_STEP: ${{ steps.login-ecr.outputs.registry }}
          FALLBACK_ECR_REGISTRY: ${{ env.FALLBACK_ECR_REGISTRY }}
        run: |
          # Prefer registry from login action, fallback to configured registry
          if [ -n "$ECR_REGISTRY_STEP" ]; then
            ECR_REGISTRY="$ECR_REGISTRY_STEP"
          else
            ECR_REGISTRY="$FALLBACK_ECR_REGISTRY"
          fi
          echo "Using ECR registry: $ECR_REGISTRY"
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest || echo "Image push failed - deployment will use existing image"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Ensure namespace exists
        run: |
          if ! kubectl get namespace "$K8S_NAMESPACE" >/dev/null 2>&1; then
            kubectl create namespace "$K8S_NAMESPACE"
          fi

      - name: Apply K8s Manifests
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/backend-secret.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/queue-worker-deployment.yaml

      - name: Patch PayPal and LiveKit credentials
        run: |
          kubectl patch secret backend-secrets -n $K8S_NAMESPACE --type=merge \
            -p '{"stringData":{"PAYPAL_CLIENT_ID":"AVp0GjORfuI3WCSagsDIJOSeSVN6vRaAoIPVNgV81WDhCfGuDDdNpvsLErD3B2QcZ4RFg5FsG4cv3OtM","PAYPAL_SECRET":"EBT861N51oybFlavu70RA3ujp2-C4taz56xgkVMBSn8SD2hLsiGJf4p8_NST0KXXVWlFIFgXbx7boC15","PAYPAL_MODE":"sandbox","LIVEKIT_URL":"wss://servipro-fztgxuz6.livekit.cloud","LIVEKIT_API_KEY":"APIRX9NnvAfiDUL","LIVEKIT_API_SECRET":"VXbcPaXi1Re0PeuefCeY4OHPB7hc2bcZRMvuSmIJCyfE","GOOGLE_CLIENT_ID":"${{ secrets.GOOGLE_CLIENT_ID }}","GOOGLE_CLIENT_SECRET":"${{ secrets.GOOGLE_CLIENT_SECRET }}","GOOGLE_REDIRECT_URI":"https://api.agendaonline.cloud-ip.cc/api/auth/google/callback","SANCTUM_STATEFUL_DOMAINS":"app.agendaonline.cloud-ip.cc","FRONTEND_URL":"https://app.agendaonline.cloud-ip.cc","RUN_MIGRATIONS":"true"}}'

      - name: Sync Atlas URI to Kubernetes Secret
        env:
          ATLAS_MONGODB_URI: ${{ secrets.ATLAS_MONGODB_URI }}
          ATLAS_LOGS_ENABLED: "true"
        run: |
          if [ -z "$ATLAS_MONGODB_URI" ]; then
            echo "Warning: ATLAS_MONGODB_URI not set in GitHub Secrets. Skipping Atlas sync."
            exit 0
          fi

          ATLAS_MONGODB_URI_B64=$(printf "%s" "$ATLAS_MONGODB_URI" | base64 -w 0)
          ATLAS_LOGS_ENABLED_B64=$(printf "%s" "${ATLAS_LOGS_ENABLED:-true}" | base64 -w 0)

          kubectl patch secret backend-secrets -n $K8S_NAMESPACE \
            --type='merge' \
            -p "{\"data\":{\"ATLAS_MONGODB_URI\":\"$ATLAS_MONGODB_URI_B64\",\"ATLAS_LOGS_ENABLED\":\"$ATLAS_LOGS_ENABLED_B64\"}}"

      - name: Remove stale backend pods before restart
        run: |
          BACKEND_PODS=$(kubectl get pods -n $K8S_NAMESPACE -l app=backend -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
          if [ -n "$BACKEND_PODS" ]; then
            echo "Deleting backend pods before rollout restart:"
            printf '%s\n' "$BACKEND_PODS"
            kubectl delete pod -n $K8S_NAMESPACE $BACKEND_PODS --ignore-not-found --wait=false
          else
            echo "No backend pods found to delete."
          fi

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment backend -n $K8S_NAMESPACE
          kubectl rollout restart deployment queue-worker -n $K8S_NAMESPACE
          kubectl wait --for=condition=available deployment/backend -n $K8S_NAMESPACE --timeout=20m
          kubectl wait --for=condition=available deployment/queue-worker -n $K8S_NAMESPACE --timeout=20m
