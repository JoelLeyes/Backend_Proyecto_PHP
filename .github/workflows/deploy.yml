name: deploy-backend

on:
  workflow_run:
    workflows: ["Laravel"]
    types: [completed]
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER: proyecto_php_cluster
      K8S_NAMESPACE: proyecto2026
      ECR_REPOSITORY: proyecto/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.1.1
        continue-on-error: true

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [ -z "$ECR_REGISTRY" ]; then
            echo "Warning: ECR login failed (IAM restrictions). Skipping image push."
            echo "If this is VocLabs, contact instructor to lift voc-cancel-cred policy."
            exit 0
          fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest || echo "Image push failed - deployment will use existing image"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Ensure namespace exists
        run: |
          if ! kubectl get namespace "$K8S_NAMESPACE" >/dev/null 2>&1; then
            kubectl create namespace "$K8S_NAMESPACE"
          fi

      - name: Apply backend secrets manifest
        run: |
          kubectl apply -f k8s/backend-secret.yaml

      - name: Sync Atlas URI to Kubernetes Secret
        env:
          ATLAS_MONGODB_URI: ${{ secrets.ATLAS_MONGODB_URI }}
          ATLAS_LOGS_ENABLED: "true"
        run: |
          if [ -z "$ATLAS_MONGODB_URI" ]; then
            echo "ATLAS_MONGODB_URI is empty or not configured in GitHub Secrets"
            exit 1
          fi

          ATLAS_MONGODB_URI_B64=$(printf "%s" "$ATLAS_MONGODB_URI" | base64 -w 0)
          ATLAS_LOGS_ENABLED_B64=$(printf "%s" "${ATLAS_LOGS_ENABLED:-true}" | base64 -w 0)

          kubectl patch secret backend-secrets -n $K8S_NAMESPACE \
            --type='merge' \
            -p "{\"data\":{\"ATLAS_MONGODB_URI\":\"$ATLAS_MONGODB_URI_B64\",\"ATLAS_LOGS_ENABLED\":\"$ATLAS_LOGS_ENABLED_B64\"}}"

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment backend -n $K8S_NAMESPACE
          kubectl rollout status deployment backend -n $K8S_NAMESPACE --timeout=10m
