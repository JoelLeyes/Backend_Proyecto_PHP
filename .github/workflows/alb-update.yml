name: ALB-Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-alb-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get EKS cluster info
        id: eks
        run: |
          CLUSTER_NAME="proyecto2026-cluster"
          aws eks update-kubeconfig --name $CLUSTER_NAME --region us-east-1
          echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT

      - name: Get cluster nodes
        id: nodes
        run: |
          # Extract instance IDs from providerID (format: aws:///region/instance-id)
          NODES=$(kubectl get nodes -o jsonpath='{.items[*].spec.providerID}' | tr ' ' '\n' | awk -F'/' '{print $NF}' | tr '\n' ' ')
          NODE_COUNT=$(kubectl get nodes --no-headers | wc -l)
          echo "nodes=$NODES" >> $GITHUB_OUTPUT
          echo "node_count=$NODE_COUNT" >> $GITHUB_OUTPUT
          echo "Found $NODE_COUNT instance IDs: $NODES"

      - name: Wait for backend deployment ready
        run: |
          kubectl rollout status deployment/backend -n proyecto2026 --timeout=300s || true

      - name: Get target group ARN
        id: tg
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups \
            --region us-east-1 \
            --names "proyecto-nginx-tg" \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT
          echo "Target Group ARN: $TG_ARN"

      - name: Get target group health status
        id: health
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          aws elbv2 describe-target-health \
            --target-group-arn "$TG_ARN" \
            --region us-east-1 \
            --output table

      - name: Register healthy targets
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          NODES="${{ steps.nodes.outputs.nodes }}"
          
          # Deregister all targets
          TARGETS=$(aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --region us-east-1 --query 'TargetHealthDescriptions[*].Target' --output json)
          echo "$TARGETS" | jq -r '.[] | "\(.Id) \(.Port)"' | while read ID PORT; do
            aws elbv2 deregister-targets \
              --target-group-arn "$TG_ARN" \
              --targets Id=$ID,Port=$PORT \
              --region us-east-1 || true
          done
          
          # Register new targets
          for NODE in $NODES; do
            aws elbv2 register-targets \
              --target-group-arn "$TG_ARN" \
              --targets Id=$NODE,Port=32080 \
              --region us-east-1
            echo "Registered target: $NODE:32080"
          done

      - name: Verify target health (wait up to 5 min)
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HEALTHY=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --region us-east-1 \
              --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`] | length(@)' \
              --output text)
            
            TOTAL=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --region us-east-1 \
              --query 'TargetHealthDescriptions | length(@)' \
              --output text)
            
            echo "Attempt $ATTEMPT: $HEALTHY/$TOTAL targets healthy"
            
            if [ "$HEALTHY" -gt 0 ]; then
              echo "✓ At least one target is healthy"
              break
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "⚠ Warning: No healthy targets after 5 minutes (target group may still be initializing)"
          fi

      - name: Final health status
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          echo "=== Final Target Group Health Status ==="
          aws elbv2 describe-target-health \
            --target-group-arn "$TG_ARN" \
            --region us-east-1 \
            --output table
