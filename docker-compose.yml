# ============================================================
# Docker Compose — Backend Servicios Profesionales
#
# Servicios:
#   - app:      Laravel API REST en :8000
#   - queue:    Queue worker (Redis jobs)
#   - postgres: PostgreSQL 16 en :5432
#   - redis:    Redis 7 en :6379
#
# Uso:
#   docker compose up --build
#   docker compose down
#   docker compose down -v   (borra datos)
# ============================================================

services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local

  queue:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: local
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: servicios_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
