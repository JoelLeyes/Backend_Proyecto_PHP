# ============================================================
# Docker Compose — Backend Servicios Profesionales
#
# Servicios:
#   - app:      Laravel API REST en :8000
#   - queue:    Queue worker (Redis jobs)
#   - postgres: PostgreSQL 16 en :5432
#   - redis:    Redis 7 en :6379
#
# Uso:
#   docker compose up --build
#   docker compose down
#   docker compose down -v   (borra datos)
# ============================================================

x-backend-env: &backend-env
  APP_ENV: local
  APP_URL: http://localhost:8000
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: servicios_pro
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: database
  MAIL_MAILER: smtp
  MAIL_HOST: smtp.gmail.com
  MAIL_PORT: 587
  MAIL_USERNAME: yoelleyes2013@gmail.com
  MAIL_PASSWORD: "bdvz hvna choi hbyf"
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: yoelleyes2013@gmail.com
  MAIL_FROM_NAME: AgendaOnline
  SANCTUM_STATEFUL_DOMAINS: localhost:5173,localhost:3000
  FRONTEND_URL: http://localhost:5173

services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *backend-env
    volumes:
      - storage_avatars:/app/storage/app/public/avatars

  reverb:
    build:
      context: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
      REVERB_PORT: 8080
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]

  queue:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *backend-env
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: servicios_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  storage_avatars:
